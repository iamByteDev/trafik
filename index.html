<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TRAFIK - Commute With Style</title>
    <link rel="icon" href="/favicon.ico?v=4" sizes="192x192" type="image/x-icon" />
    <link rel="shortcut icon" href="/favicon.ico?v=4" type="image/x-icon" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      ::-webkit-scrollbar {
        display: none;
      }

      .route-option-card {
        transform-origin: center top;
        will-change: transform, opacity, filter;
      }
    </style>
  </head>
  <body
    class="bg-black text-white font-sans h-screen flex flex-col overflow-hidden relative"
    onclick="closeAllDropdowns()"
  >
    <header
      class="shrink-0 px-6 py-4 border-b border-neutral-900 flex justify-between items-center z-10 bg-black/80 backdrop-blur-md"
    >
      <div class="flex items-center gap-2">
        <div class="w-10 h-10 rounded-xl bg-neutral-900 ring-1 ring-neutral-800 flex items-center justify-center shadow-[0_0_18px_rgba(255,255,255,0.16)] overflow-hidden p-1">
          <img src="/favicon.ico" alt="TRAFIK logo" class="w-full h-full object-contain" />
        </div>
        <h1 class="text-2xl font-black tracking-widest text-white">TRAFIK</h1>
      </div>
    </header>

    <div
      class="shrink-0 bg-neutral-950/95 border-b border-neutral-900 flex flex-col z-20 shadow-[0_10px_40px_rgba(0,0,0,0.5)] p-4 backdrop-blur-md"
    >
      <form
        id="add-form"
        class="flex flex-col sm:flex-row gap-2 items-stretch sm:items-center max-w-3xl mx-auto w-full"
      >
        <div class="flex gap-2 flex-1 relative">
          <div class="relative flex-1" onclick="event.stopPropagation()">
            <input
              type="text"
              id="start-search"
              onfocus="openDropdown('start')"
              oninput="filterStations('start')"
              placeholder="Start Station"
              class="w-full bg-neutral-900 border border-neutral-800 text-white rounded-lg px-3 py-3 focus:outline-none focus:border-white"
              autocomplete="off"
            />
            <input type="hidden" id="start-code" />
            <div
              id="start-dropdown"
              class="absolute hidden top-full mt-1 left-0 w-full bg-neutral-800 border border-neutral-700 rounded-lg shadow-xl max-h-40 overflow-y-auto z-50"
            ></div>
          </div>
          <span class="text-neutral-500 mt-3"
            ><i data-lucide="arrow-right" class="w-4 h-4"></i
          ></span>
          <div class="relative flex-1" onclick="event.stopPropagation()">
            <input
              type="text"
              id="end-search"
              onfocus="openDropdown('end')"
              oninput="filterStations('end')"
              placeholder="Destination Station"
              class="w-full bg-neutral-900 border border-neutral-800 text-white rounded-lg px-3 py-3 focus:outline-none focus:border-white"
              autocomplete="off"
            />
            <input type="hidden" id="end-code" />
            <div
              id="end-dropdown"
              class="absolute hidden top-full mt-1 left-0 w-full bg-neutral-800 border border-neutral-700 rounded-lg shadow-xl max-h-40 overflow-y-auto z-50"
            ></div>
          </div>
        </div>
        <button
          type="submit"
          class="bg-white text-black px-4 py-3 rounded-lg hover:bg-neutral-300 font-bold shrink-0"
        >
          CALCULATE ROUTING
        </button>
      </form>
    </div>

    <main class="flex-1 min-h-0 relative overflow-hidden flex flex-col p-4 pt-3">
      <div
        id="cards-layer"
        class="flex-1 overflow-y-auto flex flex-col gap-6 items-center pb-8 w-full"
      ></div>
    </main>

    <script>
      const mtrStations = {
        KET: "Kennedy Town",
        HKU: "HKU",
        SYP: "Sai Ying Pun",
        SHW: "Sheung Wan",
        CEN: "Central",

        FOH: "Fortress Hill",
        NOP: "North Point",
        QUO: "Quarry Bay",
        TAK: "Tai Koo",
        SWH: "Sai Wan Ho",
        SKW: "Shau Kei Wan",
        CHW: "Chai Wan",
        TST: "Tsim Sha Tsui",
        JOR: "Jordan",
        YMT: "Yau Ma Tei",
        MOK: "Mong Kok",

        DIH: "Diamond Hill",
        CHH: "Choi Hung",
        KOB: "Kowloon Bay",
        NTK: "Ngau Tau Kok",
        KWT: "Kwun Tong",
        LAT: "Lam Tin",
        YAT: "Yau Tong",
        TIK: "Tiu Keng Leng",
        EXH: "Exhibition Centre",
        HUH: "Hung Hom",
        MKK: "Mong Kok East",
        TAW: "Tai Wai",
        SHT: "Sha Tin",
        FOT: "Fo Tan",
        RAC: "Racecourse",
        UNI: "University",
        TAP: "Tai Po Market",
        TWO: "Tai Wo",
        FAN: "Fanling",
        SHS: "Sheung Shui",
        LOW: "Lo Wu",
        LMC: "Lok Ma Chau",
        WKS: "Wu Kai Sha",
        MOS: "Ma On Shan",
        HEO: "Heng On",
        TSH: "Tai Shui Hang",
        SHM: "Shek Mun",
        CIO: "City One",
        STW: "Sha Tin Wai",
        CKT: "Che Kung Temple",
        HIK: "Hin Keng",
        KAK: "Kai Tak",
        SUW: "Sung Wong Toi",
        TKW: "To Kwa Wan",
        ETS: "East Tsim Sha Tsui",
        AUS: "Austin",
        NAC: "Nam Cheong",
        TWC: "Tsuen Wan West",
        TWW: "Kam Sheung Road",
        KSR: "Yuen Long",
        YUL: "Long Ping",
        LOP: "Tin Shui Wai",
        TIS: "Siu Hong",
        TUM: "Tuen Mun",
        OCP: "Ocean Park",
        WCH: "Wong Chuk Hang",
        LET: "Lei Tung",
        SOH: "South Horizons",
        HOK: "Hong Kong",
        KOW: "Kowloon",
        OLY: "Olympic",
        TSY: "Tsing Yi",
        SUN: "Sunny Bay",
        TUC: "Tung Chung",
        AIR: "Airport",
        AWE: "AsiaWorld-Expo",
        TKO: "Tseung Kwan O",
        HAH: "Hang Hau",
        POA: "Po Lam",
        LHP: "LOHAS Park",
        DIS: "Disneyland Resort",
      };

      const lineNames = {
        TWL: "Tsuen Wan Line",
        ISL: "Island Line",
        KTL: "Kwun Tong Line",
        EAL: "East Rail Line",
        EAL_LMC: "East Rail (Lok Ma Chau)",
        EAL_RAC: "East Rail (Racecourse)",
        TML: "Tuen Ma Line",
        SIL: "South Island Line",
        TCL: "Tung Chung Line",
        AEL: "Airport Express",
        TKL: "Tseung Kwan O Line",
        TKL_LHP: "Tseung Kwan O (LOHAS)",
        DRL: "Disneyland Resort Line",
      };

      const mtrList = Object.keys(mtrStations).map((code) => ({
        code,
        name: mtrStations[code],
      }));

      function openDropdown(type) {
        document.getElementById(`${type}-dropdown`).classList.remove("hidden");
        filterStations(type);
      }
      function closeAllDropdowns() {
        document.getElementById("start-dropdown").classList.add("hidden");
        document.getElementById("end-dropdown").classList.add("hidden");
      }

      function filterStations(type) {
        const searchTerm = document
          .getElementById(`${type}-search`)
          .value.toLowerCase();
        const dropdown = document.getElementById(`${type}-dropdown`);
        let html = "";
        let count = 0;
        for (let i = 0; i < mtrList.length; i++) {
          if (mtrList[i].name.toLowerCase().includes(searchTerm)) {
            html += `<div class="px-3 py-2 text-sm hover:bg-neutral-700 cursor-pointer" onclick="selectStation('${type}', '${mtrList[i].code}', '${mtrList[i].name}')">${mtrList[i].name}</div>`;
            count++;
          }
        }
        dropdown.innerHTML =
          count > 0
            ? html
            : `<div class="px-3 py-2 text-sm text-neutral-500 italic">No matches...</div>`;
      }

      function selectStation(type, code, name) {
        document.getElementById(`${type}-search`).value = name;
        document.getElementById(`${type}-code`).value = code;
        closeAllDropdowns();
      }

      const API_BASE = `${window.location.origin}/api/routes`;
      const WS_URL = `${window.location.protocol === "https:" ? "wss" : "ws"}://${window.location.host}`;
      const OPTION_FUSE_MS = 680;
      let routes = [];
      let routeOptions = [];
      let selectingOptionId = null;

      const linePalette = {
        TWL: { glow: "rgba(34,197,94,0.35)", border: "rgba(34,197,94,0.7)" },
        ISL: { glow: "rgba(59,130,246,0.35)", border: "rgba(59,130,246,0.7)" },
        KTL: { glow: "rgba(16,185,129,0.35)", border: "rgba(16,185,129,0.7)" },
        EAL: { glow: "rgba(79,70,229,0.35)", border: "rgba(79,70,229,0.7)" },
        EAL_LMC: { glow: "rgba(79,70,229,0.35)", border: "rgba(79,70,229,0.7)" },
        EAL_RAC: { glow: "rgba(79,70,229,0.35)", border: "rgba(79,70,229,0.7)" },
        TML: { glow: "rgba(6,182,212,0.35)", border: "rgba(6,182,212,0.7)" },
        SIL: { glow: "rgba(245,158,11,0.35)", border: "rgba(245,158,11,0.7)" },
        TCL: { glow: "rgba(251,146,60,0.35)", border: "rgba(251,146,60,0.7)" },
        AEL: { glow: "rgba(14,165,233,0.35)", border: "rgba(14,165,233,0.7)" },
        TKL: { glow: "rgba(236,72,153,0.35)", border: "rgba(236,72,153,0.7)" },
        TKL_LHP: { glow: "rgba(236,72,153,0.35)", border: "rgba(236,72,153,0.7)" },
        DRL: { glow: "rgba(168,85,247,0.35)", border: "rgba(168,85,247,0.7)" },
      };

      function getLineTheme(line, isDelayed) {
        if (isDelayed) {
          return {
            border: "rgba(239,68,68,0.95)",
            glow: "rgba(127,29,29,0.55)",
            chip: "bg-red-600",
            label: "text-red-200",
          };
        }

        const palette = linePalette[line] || {
          glow: "rgba(115,115,115,0.35)",
          border: "rgba(163,163,163,0.6)",
        };

        return {
          ...palette,
          chip: "bg-neutral-700",
          label: "text-neutral-300",
        };
      }

      function getActiveLeg(item) {
        return item.legs[item.currentLegIndex] || null;
      }

      function getRouteStatusLabel(item) {
        const activeLeg = getActiveLeg(item);
        if (!activeLeg || activeLeg.type !== "WAITING") return null;
        if (activeLeg.apiStatus === "SERVICE_ENDED") return "Service Over";
        if (activeLeg.apiStatus === "UNAVAILABLE") return "Unavailable";
        return null;
      }

      function formatOptionMeta(summary) {
        const parts = [`${formatRouteTime(summary.estimatedMinutes)} total`];

        if (summary.transferCount === 0) {
          parts.push("Direct");
        } else if (summary.transferCount === 1) {
          parts.push("1 transfer");
        } else {
          parts.push(`${summary.transferCount} transfers`);
        }

        parts.push(`${summary.stopCount} stops`);
        return parts.join(" • ");
      }

      function renderLineChips(summary) {
        return summary.lineSegments
          .map((segment) => {
            const theme = getLineTheme(segment.line, false);
            return `<span class="text-[10px] font-bold uppercase px-2 py-1 rounded text-white" style="background:${theme.border};">${lineNames[segment.line] || segment.line}</span>`;
          })
          .join("");
      }

      function renderRouteOptions() {
        if (!routeOptions.length) return "";

        return routeOptions
          .map((option, index) => {
            const firstLine = option.summary.lineSegments[0]?.line;
            const theme = getLineTheme(firstLine, false);
            const complexityLabel =
              index === 0
                ? "Fastest"
                : index === 1
                  ? "Alternative"
                  : `Option ${option.rank}`;

            return `
          <div data-option-id="${option.id}" class="route-option-card w-full max-w-3xl bg-neutral-950 border rounded-2xl p-6 flex flex-col gap-4 relative" style="border-color:${theme.border}; box-shadow: 0 0 28px ${theme.glow};">
             <div class="flex flex-col gap-3 md:flex-row md:justify-between md:items-start">
                <div class="flex flex-col gap-2">
                   <div class="flex items-center gap-2 flex-wrap">
                        <span class="text-[10px] font-bold uppercase px-2 py-1 rounded text-white" style="background:${theme.border};">${complexityLabel}</span>
                      ${routeOptions.length > 1 ? `<span class="text-[10px] font-bold uppercase px-2 py-1 rounded bg-neutral-800 text-neutral-200">Rank ${option.rank}</span>` : ""}
                   </div>
                   <div class="text-xl font-black">${mtrStations[option.startCode]} to ${mtrStations[option.endCode]}</div>
                   <div class="text-xs font-semibold uppercase tracking-[0.2em] text-neutral-400">${formatOptionMeta(option.summary)}</div>
                </div>
                <button onclick="chooseRouteOption('${option.id}')" ${selectingOptionId ? "disabled" : ""} class="bg-white text-black px-4 py-2 rounded-lg hover:bg-neutral-300 font-bold uppercase text-sm shrink-0 disabled:opacity-50 disabled:cursor-not-allowed">Choose Route</button>
             </div>
              <div class="flex flex-wrap gap-2">${renderLineChips(option.summary)}</div>
              <div class="text-sm text-neutral-400">${option.summary.lineSegments.map((segment) => `${mtrStations[segment.from]} -> ${mtrStations[segment.to]}`).join(" • ")}</div>
           </div>
        `;
          })
          .join("");
      }

      async function init() {
        try {
          const res = await fetch(API_BASE);
          routes = await res.json();
          renderUI();
        } catch (err) {}
        const ws = new WebSocket(WS_URL);
        ws.onmessage = (event) => {
          const { type, data } = JSON.parse(event.data);
          if (type === "new_route") {
            routes = [data, ...routes.filter((route) => route.id !== data.id)];
          }
          if (type === "routes_updated") routes = data;
          if (type === "route_deleted")
            routes = routes.filter((r) => r.id !== data);
          renderUI();
        };
      }

      function resetOptionSelectionState() {
        selectingOptionId = null;
      }

      async function animateRouteOptionFusion(optionId) {
        const cards = Array.from(document.querySelectorAll("[data-option-id]"));
        const selected = cards.find((card) => card.dataset.optionId === optionId);

        if (!selected || cards.length <= 1) {
          await new Promise((resolve) => setTimeout(resolve, OPTION_FUSE_MS + 500));
          return;
        }

        const selectedRect = selected.getBoundingClientRect();
        const selectedCenterX = selectedRect.left + selectedRect.width / 2;
        const selectedCenterY = selectedRect.top + selectedRect.height / 2;

        const animations = cards.map((card, index) => {
          const rect = card.getBoundingClientRect();
          const centerX = rect.left + rect.width / 2;
          const centerY = rect.top + rect.height / 2;

          if (card === selected) {
            return card.animate(
              [
                {
                  transform: "translate3d(0, 0, 0) scale(1)",
                  opacity: 1,
                  offset: 0,
                },
                {
                  transform: "translate3d(0, -4px, 0) scale(1.01)",
                  opacity: 1,
                  offset: 1,
                },
              ],
              {
                duration: OPTION_FUSE_MS,
                easing: "cubic-bezier(0.22, 1, 0.36, 1)",
                fill: "forwards",
              },
            ).finished;
          }

          const deltaX = (selectedCenterX - centerX) * 0.94;
          const deltaY = (selectedCenterY - centerY) * 0.94;
          const scale = Math.max(0.7, 0.9 - index * 0.03);

          return card.animate(
            [
              {
                transform: "translate3d(0, 0, 0) scale(1)",
                opacity: 1,
                filter: "blur(0px)",
                offset: 0,
              },
              {
                transform: `translate3d(${deltaX * 0.72}px, ${deltaY * 0.72}px, 0) scale(${Math.min(0.92, scale + 0.08)})`,
                opacity: 0.52,
                filter: "blur(0.6px)",
                offset: 0.62,
              },
              {
                transform: `translate3d(${deltaX}px, ${deltaY}px, 0) scale(${scale})`,
                opacity: 0,
                filter: "blur(1.4px)",
                offset: 1,
              },
            ],
            {
              duration: OPTION_FUSE_MS,
              delay: Math.min(120, Math.abs(deltaY) * 0.12),
              easing: "cubic-bezier(0.22, 1, 0.36, 1)",
              fill: "forwards",
            },
          ).finished;
        });

        await Promise.allSettled(animations);

        cards.forEach((card) => {
          if (card === selected) {
            card.style.transform = "translate3d(0, -4px, 0) scale(1.01)";
            card.style.opacity = "1";
            card.style.filter = "none";
            card.style.zIndex = "4";
            return;
          }

          card.style.transform = "translate3d(0, 0, 0) scale(0.7)";
          card.style.opacity = "0";
          card.style.filter = "blur(1.4px)";
          card.style.pointerEvents = "none";
        });

        await new Promise((resolve) => setTimeout(resolve, 500));

        await selected
          .animate(
            [
              {
                transform: "translate3d(0, -4px, 0) scale(1.01)",
                opacity: 1,
              },
              {
                transform: "translate3d(0, -18px, 0) scale(1.08)",
                opacity: 1,
              },
            ],
            {
              duration: 380,
              easing: "cubic-bezier(0.16, 1, 0.3, 1)",
              fill: "forwards",
            },
          )
          .finished;

        selected.style.transform = "translate3d(0, -18px, 0) scale(1.08)";
      }

      document
        .getElementById("add-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const startCode = document.getElementById("start-code").value;
          const endCode = document.getElementById("end-code").value;
          if (!startCode || !endCode)
            return alert("Select valid MTR stations.");
          const res = await fetch(`${API_BASE}/options`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              startCode,
              endCode,
            }),
          });
          if (!res.ok) {
            const payload = await res.json().catch(() => ({}));
            routeOptions = [];
            resetOptionSelectionState();
            renderUI();
            return alert(payload.error || "No valid routes available.");
          }
          routeOptions = await res.json();
          resetOptionSelectionState();
          document.getElementById("start-search").value = "";
          document.getElementById("end-search").value = "";
          document.getElementById("start-code").value = "";
          document.getElementById("end-code").value = "";
          renderUI();
        });

      window.chooseRouteOption = async (optionId) => {
        const option = routeOptions.find((item) => item.id === optionId);
        if (!option || selectingOptionId) return;

        selectingOptionId = optionId;
        const request = fetch(API_BASE, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            optionId: option.id,
            startCode: option.startCode,
            endCode: option.endCode,
            name: `${mtrStations[option.startCode]} -> ${mtrStations[option.endCode]}`,
          }),
        });

        await animateRouteOptionFusion(optionId);

        const res = await request;

        if (!res.ok) {
          const payload = await res.json().catch(() => ({}));
          resetOptionSelectionState();
          renderUI();
          return alert(payload.error || "Could not activate the selected route.");
        }

        const createdRoute = await res.json();
        routes = [createdRoute, ...routes.filter((route) => route.id !== createdRoute.id)];
        routeOptions = [];
        resetOptionSelectionState();
        renderUI();
      };

      window.advanceRoute = async (id) => {
        await fetch(`${API_BASE}/${id}/advance`, { method: "POST" });
      };
      window.deleteRoute = async (id) => {
        await fetch(`${API_BASE}/${id}`, { method: "DELETE" });
      };

      function formatRouteTime(totalMinutes) {
        if (totalMinutes === null) return "Unavailable";
        if (!Number.isFinite(totalMinutes) || totalMinutes <= 0) return "<1m";
        const roundedMinutes = Math.ceil(totalMinutes);
        const hours = Math.floor(roundedMinutes / 60);
        const minutes = roundedMinutes % 60;

        if (!hours) return `~${minutes}m`;
        if (!minutes) return `~${hours}h`;
        return `~${hours}h ${minutes}m`;
      }

      function estimateRemainingMinutes(item) {
        const now = Date.now();

        return item.legs.reduce((total, leg, index) => {
          if (index < item.currentLegIndex) return total;

          if (leg.type === "WAITING") {
            if (index === item.currentLegIndex && leg.apiStatus === "SERVICE_ENDED") {
              return null;
            }

            if (index === item.currentLegIndex && leg.apiStatus === "UNAVAILABLE") {
              return null;
            }

            if (index === item.currentLegIndex && leg.targetTime) {
              return total + Math.max(0, leg.targetTime - now) / 60000;
            }

            if (total === null) return null;
            return total + 3;
          }

          if (total === null) return null;
          return total + (leg.duration || 0);
        }, 0);
      }

      function getDisplayState(leg) {
        if (leg.type !== "WAITING") return "LIVE";
        if (leg.arrivalState === "ARRIVING") return "ARRIVING";
        if (leg.apiStatus === "SERVICE_ENDED") return "SERVICE_ENDED";
        if (leg.apiStatus === "UNAVAILABLE") return "UNAVAILABLE";
        return leg.targetTime ? "COUNTDOWN" : "UNAVAILABLE";
      }

      function buildWaitingSubtitle(leg) {
        const parts = [`At ${mtrStations[leg.station]} (To ${mtrStations[leg.destinationStation]})`];

        if (leg.isDelayed) {
          parts.push("Delay reported");
        }

        if (leg.apiStatus === "SERVICE_ENDED") {
          parts.push(leg.apiReason || "Service ended");
        } else if (leg.apiStatus === "UNAVAILABLE") {
          parts.push(leg.apiReason || "Live ETA unavailable");
        } else if (leg.lastApiUpdatedAt) {
          parts.push("Refreshes every 10s");
        }

        return parts.join(" • ");
      }

      function renderUI() {
        const optionCards = renderRouteOptions();
        const routeCards = routes
          .map((item) => {
            if (item.status === "COMPLETED") return "";

            const activeLeg = getActiveLeg(item);
            const routeTheme = getLineTheme(activeLeg?.line, activeLeg?.isDelayed);
            const totalRemaining = formatRouteTime(estimateRemainingMinutes(item));
            const routeStatusLabel = getRouteStatusLabel(item);

            const legsHtml = item.legs
              .map((leg, i) => {
                const isActive = i === item.currentLegIndex;
                const isPast = i < item.currentLegIndex;
                const legTheme = getLineTheme(leg.line || leg.toLine, leg.isDelayed);

                let title = "";
                let subtitle = "";
                let bgStyle = isPast
                  ? "bg-neutral-900 opacity-50"
                  : isActive
                    ? "bg-neutral-800 border-neutral-600 shadow-lg"
                    : "bg-neutral-950 opacity-80";
                let badgeStyle = isActive ? "text-white" : "text-neutral-400";
                let inlineStyle = "";

                const lName = lineNames[leg.line];
                const toName = lineNames[leg.toLine];

                if (leg.type === "WAITING") {
                  title = `Wait for ${lName}`;
                  subtitle = buildWaitingSubtitle(leg);
                  badgeStyle = isActive
                    ? leg.isDelayed
                      ? "bg-red-600"
                      : "bg-amber-600"
                    : "bg-neutral-700";
                } else if (leg.type === "COMMUTING") {
                  title = `Ride ${lName}`;
                  subtitle = `Towards ${mtrStations[leg.end]}${leg.isDelayed ? " • Delay reported" : ""}`;
                  badgeStyle = isActive ? "bg-blue-600" : "bg-neutral-700";
                } else if (leg.type === "TRANSFERRING") {
                  title = `Transfer to ${toName}`;
                  subtitle = `Walk at ${mtrStations[leg.station]}`;
                  badgeStyle = isActive ? "bg-cyan-700" : "bg-neutral-700";
                }

                if (!isPast && leg.isDelayed) {
                  bgStyle = isActive
                    ? "bg-neutral-900 shadow-lg"
                    : "bg-neutral-950 opacity-95";
                  inlineStyle = `border-color:${legTheme.border}; box-shadow: inset 0 0 0 1px ${legTheme.border}, 0 0 24px ${legTheme.glow};`;
                }

                let rightPanelHtml = "";
                if (isActive) {
                  const displayState = getDisplayState(leg);
                  rightPanelHtml = `
                <div class="flex flex-col items-end gap-2">
                   <div class="time-display text-3xl font-black tracking-tighter" data-target="${leg.targetTime || ""}" data-phase="${leg.type}" data-status="${displayState}" data-reason="${leg.apiReason || ""}">--:--</div>
                   <button onclick="advanceRoute('${item.id}')" class="bg-white text-black px-3 py-1 rounded text-xs font-bold hover:bg-neutral-300 uppercase">Next Step</button>
                 </div>`;
                } else if (isPast) {
                  rightPanelHtml = `<div class="text-neutral-600"><i data-lucide="check-circle-2" class="w-6 h-6"></i></div>`;
                } else {
                  rightPanelHtml = `<div class="text-neutral-600 font-mono text-sm">${leg.duration ? "~" + leg.duration + "m" : leg.apiStatus === "SERVICE_ENDED" ? "SERVICE OVER" : leg.apiStatus === "UNAVAILABLE" ? "UNAVAILABLE" : "LIVE"}</div>`;
                }

                return `
            <div class="flex items-center p-4 rounded-xl border border-neutral-800 ${bgStyle} transition-all w-full" style="${inlineStyle}">
               <div class="flex flex-col gap-1 flex-1">
                  <div class="flex items-center gap-2"><span class="text-[10px] font-bold uppercase px-2 py-0.5 rounded text-white ${badgeStyle}">${leg.type}</span><span class="font-bold text-sm ${isActive ? "text-white" : "text-neutral-400"}">${title}</span></div>
                  <div class="text-xs font-medium text-neutral-500 uppercase tracking-wide">${subtitle}</div>
               </div>
               ${rightPanelHtml}
            </div>
          `;
              })
              .join("");

            return `
          <div class="w-full max-w-3xl bg-neutral-950 border border-neutral-800 rounded-2xl p-6 flex flex-col gap-5 relative" style="border-color:${routeTheme.border}; box-shadow: 0 0 32px ${routeTheme.glow};">
             <div class="flex justify-between items-center border-b border-neutral-800 pb-4" style="border-color:${routeTheme.border}">
                  <div class="text-xl font-black">${item.name}</div>
                  <div class="flex items-center gap-3">
                     ${routeStatusLabel ? `<div class="text-[10px] font-bold uppercase px-2 py-1 rounded text-white ${activeLeg?.isDelayed ? "bg-red-600" : "bg-neutral-700"}">${routeStatusLabel}</div>` : ""}
                     <div class="text-xs font-semibold uppercase tracking-[0.2em] ${activeLeg?.isDelayed ? "text-red-300" : "text-neutral-500"}">ETA ${totalRemaining}</div>
                     <button onclick="deleteRoute('${item.id}')" class="text-neutral-500 hover:text-red-500"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                  </div>
               </div>
              <div class="flex flex-col gap-3">${legsHtml}</div>
           </div>
        `;
          })
          .join("");

        document.getElementById("cards-layer").innerHTML = `${optionCards}${routeCards}`;
        lucide.createIcons();
      }

      function updateLoop() {
        const now = Date.now();
        document.querySelectorAll(".time-display").forEach((el) => {
          const rawTarget = el.getAttribute("data-target");
          const status = el.getAttribute("data-status");
          const phase = el.getAttribute("data-phase");
          const target = rawTarget ? parseInt(rawTarget, 10) : NaN;

          if (status === "SERVICE_ENDED") {
            el.innerHTML = `<span class="text-red-400 text-xl">SERVICE OVER</span>`;
            return;
          }

          if (status === "UNAVAILABLE") {
            el.innerHTML = `<span class="text-neutral-400 text-xl">UNAVAILABLE</span>`;
            return;
          }

          if (status === "ARRIVING") {
            el.innerHTML = `<span class="text-amber-500 text-xl animate-pulse">ARRIVING</span>`;
            return;
          }

          if (!Number.isFinite(target)) return;

          const remainingMs = Math.max(0, target - now);
          const mins = Math.floor(remainingMs / 60000);
          const secs = Math.floor((remainingMs % 60000) / 1000);

          if (remainingMs === 0 && phase === "WAITING") {
            el.innerHTML = `<span class="text-amber-500 text-xl animate-pulse">ARRIVING</span>`;
          } else if (remainingMs === 0) {
            el.innerHTML = `<span class="text-green-500 text-xl animate-pulse">DONE</span>`;
          } else {
            el.innerText = `${mins}m ${secs.toString().padStart(2, "0")}s`;
          }
        });
        requestAnimationFrame(updateLoop);
      }

      init();
      requestAnimationFrame(updateLoop);
    </script>
  </body>
</html>
